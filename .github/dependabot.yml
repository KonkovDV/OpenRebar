version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src/OpenRebar.Application"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/src/OpenRebar.Domain"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/src/OpenRebar.Infrastructure"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/src/OpenRebar.RevitPlugin"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/src/OpenRebar.Cli"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/tests/OpenRebar.Application.Tests"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/tests/OpenRebar.Domain.Tests"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/tests/OpenRebar.Infrastructure.Tests"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/ml"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
