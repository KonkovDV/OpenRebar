name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OpenRebar.sln --locked-mode -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build OpenRebar.sln --no-restore --configuration Release -p:EnableWindowsTargeting=true

      - name: Test
        run: dotnet test OpenRebar.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Verify README regression claim
        run: python tools/ci/verify_readme_regression_claim.py

      - name: Generate dependency governance reports
        run: |
          mkdir -p artifacts/dependency-audit
          dotnet list OpenRebar.sln package --include-transitive --vulnerable > artifacts/dependency-audit/deps-vulnerable.txt || true
          dotnet list OpenRebar.sln package --outdated > artifacts/dependency-audit/deps-outdated.txt || true

      - name: Run benchmark gate and export summary
        env:
          OPENREBAR_BENCH_SUMMARY_PATH: artifacts/benchmark/column-generation-summary.json
        run: |
          mkdir -p artifacts/benchmark
          dotnet test tests/OpenRebar.Infrastructure.Tests/OpenRebar.Infrastructure.Tests.csproj --no-build --configuration Release --filter FullyQualifiedName~ColumnGenerationBenchmarkPackTests --logger "trx;LogFileName=benchmark-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Upload dependency governance reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: dependency-audit
          path: artifacts/dependency-audit/

      - name: Upload benchmark summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: benchmark-summary
          path: |
            artifacts/benchmark/column-generation-summary.json
            **/benchmark-results.trx

      - name: Publish CLI
        run: dotnet publish src/OpenRebar.Cli/OpenRebar.Cli.csproj --no-build --configuration Release --output ./publish/cli

      - name: Generate SBOM
        uses: anchore/sbom-action@fc46e51fd3cb168ffb36c6d1915723c47db58abb
        with:
          path: ./publish/cli
          artifact-name: OpenRebar-sbom.spdx.json
          output-file: ./publish/OpenRebar-sbom.spdx.json

  python-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Refresh locked requirements
        run: |
          python -m pip install --require-hashes -r .github/requirements/pip-tools.locked.txt
          python -m piptools compile --allow-unsafe --generate-hashes --output-file=ml/requirements.locked.txt ml/requirements.in

      - name: Install ML dependencies
        run: python -m pip install --require-hashes -r ml/requirements.locked.txt

      - name: Validate locked requirements hash entries
        run: |
          python - <<'PY'
          from pathlib import Path

          lock_path = Path("ml/requirements.locked.txt")
          text = lock_path.read_text(encoding="utf-8")
          if "--hash=sha256:" not in text:
              raise SystemExit(f"No sha256 hashes found in {lock_path}")
          print(f"OK: hash entries detected in {lock_path}")
          PY

      - name: Validate model manifest
        run: python ml/scripts/validate_model_manifest.py ml/models/MANIFEST.json

      - name: Run Python smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}/ml
        working-directory: ml
        run: pytest tests -q

  ifc-validation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OpenRebar.sln --locked-mode -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build OpenRebar.sln --no-restore --configuration Release -p:EnableWindowsTargeting=true

      - name: Validate IFC examples
        run: python3 tools/ci/validate_ifc_examples.py

      - name: Upload IFC validation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ifc-validation
          path: artifacts/ifc-validation/
